    - generic [ref=e17]: Conceptos clave Tres conceptos que necesitamos distinguir antes de avanzar. Clima Organizacional Percepciones compartidas de los colaboradores sobre las prácticas, políticas y procedimientos de la organización. Se mide mediante encuestas con escalas tipo Likert. Captura actitudes individuales agregadas , no relaciones. Schneider, Ehrhart & Macey (2013). "Organizational Climate and Culture." Annual Review of Psychology. Análisis de Redes Organizacionales (ONA) Mapeo y análisis de las relaciones informales de colaboración, comunicación y confianza. Captura estructura relacional — quién se conecta con quién y qué rol juegan en la red. Cross, R. & Parker, A. (2004). "The Hidden Power of Social Networks." Harvard Business School Press. Graph ML (Machine Learning sobre Grafos) Familia de técnicas de aprendizaje automático que operan sobre datos con estructura de grafo (nodos + aristas). Incluye detección de comunidades, cálculo de centralidad, y modelos que incorporan atributos relacionales. Hamilton, W. L. (2020). "Graph Representation Learning." Morgan & Claypool.
